name: Update README

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:      # Manual trigger
  push:
    branches: [ main ]    # On push to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
      # Step 1: Checkout with latest version
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4
      
      # Step 2: Generate Snake Animation
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: SrustiSulipalmath
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      
      # Step 3: Deploy Snake to output branch
      - name: Deploy Snake to output branch
        uses: peaceiris/actions-gh-pages@v4  # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ./
          publish_branch: output
          
      # Step 4: Update recent activity (FIXED - removed GITHUB_TOKEN)
      - name: Update recent activity
        uses: Readme-Workflows/recent-activity@main
        # Removed GITHUB_TOKEN input as it's not supported
          
      # Step 5: Commit and push changes
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update README with recent activity [skip ci]"
          git push
