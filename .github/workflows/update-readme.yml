name: Update README

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight
  workflow_dispatch:      # Allows manual trigger
  push:
    branches: [ main ]    # Runs when you push to main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to push changes
      pages: write         # Required for deployment
      id-token: write      # Required for authentication
      
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # Step 2: Generate Snake Animation (This works!)
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: SrustiSulipalmath
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      
      # Step 3: Deploy Snake to output branch
      - name: Deploy Snake to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ./
          publish_branch: output
          
      # Step 4: Update README with recent activity (FIXED VERSION)
      - name: Update recent activity
        uses: Readme-Workflows/recent-activity@main  # Changed from v2 to main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Step 5: Commit and push changes
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update README with recent activity"
          git push
